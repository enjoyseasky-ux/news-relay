name: Fetch Reuters                                                                                          
                                                                                                               
on:                                                                                                          
    schedule:                                                                                                  
      - cron: '30 21 * * *'                                                                                    
    workflow_dispatch:                                                                                         
                                                                                                               
jobs:                                                                                                        
    fetch:                                                                                                     
      runs-on: ubuntu-latest                                                                                   
      permissions:
        contents: write
      steps:
        - uses: actions/checkout@v4

        - name: Fetch Reuters
          run: |
            python3 fetch_reuters.py
            echo "--- files ---"
            ls -la                                                                                             
            cat reuters.json || echo "reuters.json NOT FOUND"
                                                                                                               
        - name: Commit and push
          run: |                                                                                               
            git config user.name 'github-actions[bot]'                                                       
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add reuters.json                                                                               
            git diff --staged --quiet || git commit -m "Reuters $(date -u +%Y-%m-%d)"
            git push         
