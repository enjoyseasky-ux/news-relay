  name: Fetch Truth Social                                                                                                 

  on:
    schedule:
      - cron: '0 22 * * *'
    workflow_dispatch:                                                                                                       
               
  jobs:                                                                                                                      
    fetch:                                                                                                                 
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:                                                                                                              
            python-version: '3.x'
        - name: Fetch Truth Social                                                                                           
          run: python fetch-truthsocial.py                                                                                   
        - name: Commit
          run: |                                                                                                             
            git config user.name "github-actions"
            git config user.email "actions@github.com"                                                                       
            git add truthsocial.json
            git diff --cached --quiet || git commit -m "update truthsocial $(date -u +%Y-%m-%d)"                             
            git push                          
